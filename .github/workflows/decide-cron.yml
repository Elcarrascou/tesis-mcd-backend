name: Decide cron

# Agente IA diario -> escribe decisiones en Supabase (ai_decisions).
# Espeja predict-cron.yml y corre justo despues (consume las predicciones frescas).
# Motor anthropic (Claude Haiku reescribe el rationale; la decision sigue siendo
# determinista/auditable). Si falta ANTHROPIC_API_KEY el router cae a rule-based.
on:
  schedule:
    # 11:10 UTC ~ 07:10 Chile, 10 min despues del predict-cron.
    - cron: "10 11 * * 1-5"
  workflow_dispatch: {}  # permite correrlo a mano desde la pestana Actions

jobs:
  decide:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ml.txt

      - name: Run decision pipeline (--write)
        env:
          PYTHONUTF8: "1"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m app.pipeline.decide --engine anthropic --write
