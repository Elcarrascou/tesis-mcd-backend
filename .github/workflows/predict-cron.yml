name: Predict cron

# Inferencia diaria → escribe en Supabase (ml_predictions).
# Corre en GitHub Actions (gratis), usa los artefactos horneados en el repo y las
# secrets del repositorio. Alternativa al cron de Railway (free tier limitado).
on:
  schedule:
    # 11:00 UTC ~ 07:00 Chile (tras cierre de sesiones previas). Ajustable.
    - cron: "0 11 * * 1-5"
  workflow_dispatch: {}  # permite correrlo a mano desde la pestaña Actions

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ml.txt

      - name: Run prediction pipeline (--write)
        env:
          PYTHONUTF8: "1"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m app.pipeline.predict --write
