name: Snapshot cron

# Snapshot operacional diario: revalúa portfolio con precios Yahoo + inserta fila
# en performance (Fase G2). Corre tras predict/decide para mantener el portal fresco.
on:
  schedule:
    # 11:20 UTC ~ 07:20 Chile, despues de predict-cron (11:00) y decide-cron (11:10).
    - cron: "20 11 * * 1-5"
  workflow_dispatch: {}  # permite correrlo a mano desde la pestana Actions

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ml.txt

      - name: Run snapshot pipeline (--write)
        env:
          PYTHONUTF8: "1"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m app.pipeline.snapshot --write
