name: CI

# Lint + tests del backend. Espeja lo que se corre en local:
#   ruff check .  &&  pytest
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        # requirements-ml.txt incluye core + modelos (torch/prophet/xgboost/sklearn).
        # Necesario: app.main importa los modelos al arrancar.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ml.txt
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest)
        env:
          PYTHONUTF8: "1"
        run: pytest -q
