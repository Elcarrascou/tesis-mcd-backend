# Configuración de herramientas (lint + tests).
# Las dependencias se manejan en requirements*.txt (más simple para un solo servicio).

[tool.ruff]
line-length = 100
target-version = "py312"
# Los notebooks usan estilo exploratorio (imports agrupados, ; para plots).
extend-exclude = ["notebooks"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
